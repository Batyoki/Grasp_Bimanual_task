# config/teleop_params.yaml
# --------------------------
# All tunable parameters for the bimanual MISA-MPC bilateral teleoperation system.
# Load via the launch file or: ros2 run bilateral_teleop bimanual_teleop_node
#                                  --ros-args --params-file config/teleop_params.yaml
# Dynamixel PID to physical gains conversion
# XM430-W350 specs:
#   Position resolution: 4096 counts/rev → 2π/4096 rad/count
#   Max torque: 3.1 Nm (stall), rated 1.5 Nm
#   Gear ratio: 353.5:1

# For XM430-W350:
# K [Nm/rad] = P_gain * (0.11926 / 1000)  ← from Dynamixel documentation formula
# D [Nm·s/rad] = D_gain * (3.5765e-5)

# <<USER: Read your actual P_gain values from the motors using dynamixel wizard
#         or the SDK. These are the DEFAULT values — yours may differ.>>

# XM540-W270 (shoulder/elbow on vx300s — stronger motor):
#   Default P_gain = 800
#   K = 800 * 0.11926 / 1000 = 0.0954 Nm/rad  ← very low, almost no stiffness
#   This is why the arm drifts easily in position mode

# More useful approach: use impedance-appropriate values
# For teleoperation, you want K high enough to track but low enough to be compliant

# Recommended starting values derived from motor specs:
#
# Motor         Joint           K (Nm/rad)   D (Nm·s/rad)
# XM540-W270   waist            50.0          2.0
# XM540-W270   shoulder         80.0          3.0   (two motors → higher effective K)
# XM430-W350   elbow            40.0          1.5
# XM430-W350   forearm_roll     20.0          0.8
# XM430-W350   wrist_angle      15.0          0.6
# XM430-W350   wrist_rotate     10.0          0.4
# XL430-W250   gripper           5.0          0.2
# XL430-W250   finger            5.0          0.2

controller:
  ros__parameters:

    control_mode: "MISA"

    # -------------------------------------------------------------------------
    # Control loop rate (Hz)
    # 100 Hz is the target. MPC solve time must stay well below 10ms.
    # If MPC is too slow, reduce mpc_horizon or switch to a faster QP solver.
    # -------------------------------------------------------------------------
    loop_rate_hz: 50.0

    # -------------------------------------------------------------------------
    # MPC prediction horizon (steps)
    # Larger N = better prediction but slower solve. Start with N=5 for testing.
    # <<USER: Tune N vs solve time; measure with /teleop/diagnostics>>
    # -------------------------------------------------------------------------
    mpc_horizon: 3

    # -------------------------------------------------------------------------
    # Stale state timeout [seconds]
    # If joint states are older than this, the node skips the control cycle.
    # -------------------------------------------------------------------------
    state_timeout_s: 0.5

    # -------------------------------------------------------------------------
    # Master Impedance Gains (ViperX300s)
    # [waist, shoulder, elbow, forearm_roll, wrist_angle]
    #
    # Mmd: Virtual inertia felt by operator. Lower = more responsive to operator.
    # Dmd: Damping. Higher = smoother but more sluggish force feedback rendering.
    # Kmd: Stiffness coupling master to slave position. Higher = tighter tracking.
    #
    # <<USER: Start with these defaults. Increase Dmd if oscillations appear.
    #         Increase Kmd if slave lags master too much.>>
    # -------------------------------------------------------------------------
    # master_Mmd_diag: 
    #   - [0.010383676154181775, 1.9283943913232697e-05, -0.00010735309590607883, -5.1579264321691334e-05, -0.0028433530866291694, -1.0852122485214775e-06, -0.001516304446763028, -0.001516304446763028], 
    #   - [1.9283943913232697e-05, 0.023284277319228164, 0.007665637623005733, 0.0021832730748863093, -3.086531040523085e-05, -4.330007023104318e-09, 2.528320769324419e-05, 2.528320769324419e-05], 
    #   - [-0.00010735309590607883, 0.007665637623005733, 0.020444909135600098, 0.0058846186544989874, 7.494274319350866e-05, 1.8743582054134076e-08, -0.0015945512293697173, -0.0015945512293697173], 
    #   - [-5.1579264321691334e-05, 0.0021832730748863093, 0.0058846186544989874, 0.005062545866014455, 5.178451604397904e-05, 1.3693461587576714e-08, -0.0012400177835472019, -0.0012400177835472019], 
    #   - [-0.0028433530866291694, -3.086531040523085e-05, 7.494274319350866e-05, 5.178451604397904e-05, 0.003076033791487882, 1.1156076719763623e-06, 0.0, 0.0], 
    #   - [-1.0852122485214775e-06, -4.330007023104318e-09, 1.8743582054134076e-08, 1.3693461587576714e-08, 1.1156076719763623e-06, 1.1156076719763623e-06, 0.0, 0.0], 
    #   - [-0.001516304446763028, 2.528320769324419e-05, -0.0015945512293697173, -0.0012400177835472019, 0.0, 0.0, 0.016246, 0.0], 
    #   - [-0.001516304446763028, 2.528320769324419e-05, -0.0015945512293697173, -0.0012400177835472019, 0.0, 0.0, 0.0, 0.016246]
    master_Dmd_diag: [2.0, 4.4, 4.4, 0.6, 0.4, 0.2, 0.2, 0.2]
    master_Kmd_diag: [50.0, 120.0, 60.0, 24.0, 12.0, 6.0, 6.0, 6.0]

    # -------------------------------------------------------------------------
    # Slave Admittance Gains (ReactorX150)
    # [waist, shoulder, elbow, wrist_angle, wrist_rotate]
    #
    # Msd: Virtual inertia for slave compliance. Lower = more compliant.
    # Dsd: Damping for slave compliance response.
    # Ksd: Stiffness coupling slave to master reference. Lower = more compliant.
    #
    # <<USER: Lower Ksd for tasks requiring soft contact (e.g. wiping surfaces).
    #         Higher Ksd for tasks requiring precise position tracking.>>
    # -------------------------------------------------------------------------
    # slave_Msd_diag:  
    #         - [0.06876377737860334, -0.0005056527410784615, -0.00028279810935748976, 0.000010155212722122857, 0.0004240096238415313, 0.000002584853006351827, 0.0024472469075426323, 0.0024472469075426323],
    #         - [-0.0005056527410784615, 0.1582853833342141, 0.05101149308932666, 0.011892428176855575, 0.00014495248978138928, -6.136340959673144e-13, -0.0020132164084029945, -0.0020132164084029945],
    #         - [-0.00028279810935748976, 0.05101149308932666, 0.1041925406644383, 0.019076532826430143, 0.00023862462038902785, -1.041306890740881e-12, -0.0032419879536877395, -0.0032419879536877395],
    #         - [0.000010155212722122857, 0.011892428176855575, 0.019076532826430143, 0.005656120423193295, 0.00007595922882253786, -2.986360219039936e-13, -0.0011081771471765783, -0.0011081771471765783],
    #         - [0.0004240096238415313, 0.00014495248978138928, 0.00023862462038902785, 0.00007595922882253786, 0.0007291535985100971, 0.000004297900000006505, 0, 0],
    #         - [0.000002584853006351827, -6.136340959673144e-13, -1.041306890740881e-12, -2.986360219039936e-13, 0.000004297900000006505, 0.000004297900000006505, 0, 0],
    #         - [0.0024472469075426323, -0.0020132164084029945, -0.0032419879536877395, -0.0011081771471765783, 0, 0, 0.034796, 0],
    #         - [0.0024472469075426323, -0.0020132164084029945, -0.0032419879536877395, -0.0011081771471765783, 0, 0, 0, 0.034796]
    slave_Dsd_diag:  [2.0, 3.0, 1.5, 0.6, 0.4, 0.2, 0.2, 0.2]
    slave_Ksd_diag:  [25.0, 40.0, 20.0, 15.0, 5.0, 2.5, 2.5, 2.5]

    # -------------------------------------------------------------------------
    # Four-Channel Coupling Gains
    #
    # kof: Weight for remote (slave) torque feedback to master.
    #      1.0 = full slave contact force rendered on master.
    #      0.0 = no force feedback (unilateral teleoperation).
    #      <<USER: Start at 0.5 and increase carefully — too high causes instability>>
    #
    # ksf: Weight for local master torque (operator force) in the master loop.
    #
    # kom: Weight for remote slave position feedback to master.
    #
    # ksm: Weight for local master position in its own control law.
    # -------------------------------------------------------------------------
    kof: 0.4
    ksf: 0.2
    kom: 0.5
    ksm: 0.2