port: /dev/ttyVX300SR
write_eeprom_on_startup: true    # ADD THIS
groups:
  arm:
    operating_mode: position
    profile_type: velocity
    profile_velocity: 0
    profile_acceleration: 0
    torque_enable: true

singles:
  gripper:
    operating_mode: linear_position
    profile_type: velocity
    profile_velocity: 0
    profile_acceleration: 0
    torque_enable: true
